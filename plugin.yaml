# Pixellab AI — pixelworkspace plugin manifest.
# `contributes` declares what the plugin adds, so the app knows its capabilities
# WITHOUT running the code. The ids here must match the px.register* calls in the
# source (see src/main.ts) — `npm run validate` enforces this.

name: Pixellab AI
version: 0.2.0
entry: output/entry.js
hosts:
  - api.pixellab.ai
description: >-
  Generate, animate and repaint sprites with the Pixellab AI API — own panel
  with job tracking, progress, cost details, and metadata-tagged file storage.
  Built purely on the generic px.* extension API.

contributes:
  panels:
    - id: main
      title: Pixellab AI
  commands:
    - id: pixellab.generate
      title: Generate sprite → canvas
  menus:
    - path: Pixellab/Generate sprite → canvas
      command: pixellab.generate
